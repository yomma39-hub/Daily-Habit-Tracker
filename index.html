<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>습관 여정 - Daily Habit Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <style>
        :root { --font-sans: "Inter", sans-serif; --font-serif: "Cormorant Garamond", serif; }
        body { font-family: var(--font-sans); background-color: #F5F5F0; color: #1A1A1A; margin: 0; }
        .font-serif { font-family: var(--font-serif); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(90, 90, 64, 0.2); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="min-h-screen pb-20 px-6 py-12">
        <div class="max-w-4xl mx-auto">
            <!-- Header -->
            <header class="flex items-center justify-between mb-12">
                <div>
                    <h1 class="text-4xl font-serif font-light tracking-tight">하루 <span class="italic text-[#5A5A40]">일정</span></h1>
                    <p class="text-sm text-[#5A5A40]/60 mt-1 uppercase tracking-widest font-medium">월간 진행 현황</p>
                </div>
                <button onclick="toggleSettings(true)" class="p-3 bg-white rounded-full shadow-sm hover:shadow-md transition-all text-[#5A5A40]">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
                <!-- Calendar Section -->
                <div class="lg:col-span-7">
                    <div class="bg-white rounded-[32px] p-8 shadow-sm border border-[#5A5A40]/5">
                        <div class="flex items-center justify-between mb-8">
                            <h2 id="calendar-title" class="text-2xl font-serif italic text-[#1A1A1A]">2024년 3월</h2>
                            <div class="flex gap-2">
                                <button onclick="changeMonth(-1)" class="p-2 hover:bg-[#F5F5F0] rounded-full transition-colors">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                                </button>
                                <button onclick="changeMonth(1)" class="p-2 hover:bg-[#F5F5F0] rounded-full transition-colors">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                                </button>
                            </div>
                        </div>
                        <div class="grid grid-cols-7 gap-2 mb-2 text-center text-[10px] uppercase tracking-widest font-bold text-[#5A5A40]/40">
                            <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
                        </div>
                        <div id="calendar-grid" class="grid grid-cols-7 gap-2"></div>
                    </div>
                </div>

                <!-- Detail Section -->
                <div class="lg:col-span-5">
                    <div class="sticky top-8">
                        <div class="mb-8">
                            <span class="text-[10px] uppercase tracking-[0.2em] text-[#5A5A40]/50 font-bold">선택된 날짜</span>
                            <h3 id="selected-date-title" class="text-3xl font-serif mt-1">3월 12일</h3>
                        </div>
                        <div id="habit-list" class="space-y-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-6">
        <div onclick="toggleSettings(false)" class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
        <div class="relative w-full max-w-md bg-white rounded-[40px] p-10 shadow-2xl">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-2xl font-serif">습관 관리</h2>
                <button onclick="toggleSettings(false)" class="p-2 hover:bg-[#F5F5F0] rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </button>
            </div>
            <div class="relative mb-8 flex gap-2">
                <input id="new-habit-input" type="text" placeholder="새로운 습관 이름..." class="flex-1 bg-[#F5F5F0] border-none rounded-2xl px-6 py-4 focus:ring-2 focus:ring-[#5A5A40]/20 outline-none">
                <button onclick="addHabit()" class="p-4 bg-[#5A5A40] text-white rounded-2xl hover:bg-[#4A4A30] transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                </button>
            </div>
            <div id="manage-habit-list" class="space-y-2 max-h-[300px] overflow-y-auto pr-2 custom-scrollbar"></div>
            <button onclick="toggleSettings(false)" class="w-full mt-8 py-4 bg-[#5A5A40] text-white rounded-2xl font-bold uppercase tracking-widest text-xs">완료</button>
        </div>
    </div>

    <script>
        // --- State ---
        let habits = JSON.parse(localStorage.getItem('habits-v3')) || [{ id: 'h1', text: '리뷰 관리 매일매일 하기' }];
        let completions = JSON.parse(localStorage.getItem('completions-v3')) || {};
        let currentMonth = new Date();
        let selectedDate = new Date();

        // --- Core Functions ---
        function save() {
            localStorage.setItem('habits-v3', JSON.stringify(habits));
            localStorage.setItem('completions-v3', JSON.stringify(completions));
        }

        function formatDate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function changeMonth(offset) {
            currentMonth.setMonth(currentMonth.getMonth() + offset);
            render();
        }

        function selectDate(y, m, d) {
            selectedDate = new Date(y, m, d);
            render();
        }

        function toggleHabit(habitId) {
            const key = formatDate(selectedDate);
            if (!completions[key]) completions[key] = [];
            
            const index = completions[key].indexOf(habitId);
            if (index > -1) completions[key].splice(index, 1);
            else completions[key].push(habitId);
            
            save();
            render();
        }

        function addHabit() {
            const input = document.getElementById('new-habit-input');
            const text = input.value.trim();
            if (!text) return;
            habits.push({ id: 'h-' + Date.now(), text });
            input.value = '';
            save();
            render();
        }

        function deleteHabit(id) {
            if (!confirm('이 습관을 삭제하시겠습니까?')) return;
            habits = habits.filter(h => h.id !== id);
            save();
            render();
        }

        function toggleSettings(show) {
            document.getElementById('settings-modal').classList.toggle('hidden', !show);
            if (show) renderManageHabits();
        }

        // --- Rendering ---
        function render() {
            renderCalendar();
            renderHabitList();
            renderManageHabits();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const title = document.getElementById('calendar-title');
            grid.innerHTML = '';
            
            const year = currentMonth.getFullYear();
            const month = currentMonth.getMonth();
            title.innerText = `${year}년 ${month + 1}월`;

            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            const prevLastDate = new Date(year, month, 0).getDate();

            // Previous month days
            for (let i = firstDay - 1; i >= 0; i--) {
                const dayDiv = document.createElement('div');
                dayDiv.className = "aspect-square rounded-xl flex items-center justify-center text-sm opacity-10 font-medium";
                dayDiv.innerText = prevLastDate - i;
                grid.appendChild(dayDiv);
            }

            // Current month days
            for (let i = 1; i <= lastDate; i++) {
                const dateObj = new Date(year, month, i);
                const key = formatDate(dateObj);
                const doneCount = (completions[key] || []).length;
                const rate = habits.length > 0 ? doneCount / habits.length : 0;
                const isSelected = formatDate(selectedDate) === key;
                const isToday = formatDate(new Date()) === key;

                const btn = document.createElement('button');
                btn.onclick = () => selectDate(year, month, i);
                btn.className = `aspect-square rounded-xl flex flex-col items-center justify-center relative transition-all border-2 ${isSelected ? 'border-[#5A5A40]' : 'border-transparent'}`;
                
                if (rate > 0) {
                    btn.style.backgroundColor = `rgba(90, 90, 64, ${0.1 + rate * 0.8})`;
                    btn.style.color = rate > 0.6 ? 'white' : '#1A1A1A';
                } else {
                    btn.className += " bg-[#F9F9F7]";
                }

                btn.innerHTML = `<span class="text-sm font-medium ${isToday && rate === 0 ? 'text-[#5A5A40] underline underline-offset-4 decoration-2' : ''}">${i}</span>`;
                if (rate === 1) {
                    btn.innerHTML += `<div class="absolute top-1 right-1 w-1.5 h-1.5 bg-emerald-400 rounded-full"></div>`;
                }
                grid.appendChild(btn);
            }
        }

        function renderHabitList() {
            const list = document.getElementById('habit-list');
            const title = document.getElementById('selected-date-title');
            list.innerHTML = '';
            title.innerText = `${selectedDate.getMonth() + 1}월 ${selectedDate.getDate()}일`;

            const key = formatDate(selectedDate);
            const dayCompletions = completions[key] || [];

            if (habits.length === 0) {
                list.innerHTML = `<div class="text-center py-12 bg-white rounded-3xl border border-dashed border-[#5A5A40]/20"><p class="text-sm text-[#5A5A40]/40">등록된 습관이 없습니다.</p></div>`;
                return;
            }

            habits.forEach(habit => {
                const isDone = dayCompletions.includes(habit.id);
                const div = document.createElement('div');
                div.onclick = () => toggleHabit(habit.id);
                div.className = `flex items-center gap-4 p-5 rounded-2xl cursor-pointer transition-all border ${isDone ? 'bg-[#5A5A40] text-white border-transparent' : 'bg-white border-[#5A5A40]/5 shadow-sm hover:border-[#5A5A40]/20'}`;
                
                div.innerHTML = `
                    ${isDone 
                        ? '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>' 
                        : '<svg class="text-[#5A5A40]/30" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>'}
                    <span class="flex-1 text-lg font-medium ${isDone ? 'opacity-80' : ''}">${habit.text}</span>
                `;
                list.appendChild(div);
            });
        }

        function renderManageHabits() {
            const list = document.getElementById('manage-habit-list');
            list.innerHTML = '';
            habits.forEach(habit => {
                const div = document.createElement('div');
                div.className = "flex items-center justify-between p-4 bg-[#F5F5F0]/50 rounded-xl group";
                div.innerHTML = `
                    <span class="font-medium">${habit.text}</span>
                    <button onclick="deleteHabit('${habit.id}')" class="text-red-400 hover:text-red-600">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
                    </button>
                `;
                list.appendChild(div);
            });
        }

        // Initial Render
        render();
    </script>
</body>
</html>
