<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하루 할일 - Daily Task Tracker</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Inter:wght@100..900&display=swap" rel="stylesheet">
    
    <!-- React & Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- date-fns -->
    <script src="https://cdn.jsdelivr.net/npm/date-fns@2.30.0/dist/date-fns.min.js"></script>

    <style>
        :root {
            --font-sans: "Inter", ui-sans-serif, system-ui, sans-serif;
            --font-serif: "Cormorant Garamond", serif;
        }
        body {
            font-family: var(--font-sans);
            background-color: #F5F5F0;
            color: #1A1A1A;
            margin: 0;
        }
        .font-serif { font-family: var(--font-serif); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { 
            background: rgba(90, 90, 64, 0.2); 
            border-radius: 10px; 
        }
        
        /* Simple animations */
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .modal-bg { animation: modalBg 0.3s ease-out; }
        @keyframes modalBg { from { opacity: 0; } to { opacity: 1; } }
        
        .modal-content { animation: modalContent 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes modalContent { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Cormorant Garamond', 'serif'],
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="root">
        <div style="display: flex; justify-content: center; align-items: center; height: 100vh;">
            <p>애플리케이션을 불러오는 중입니다...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Icon Component using Lucide
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={`inline-block ${className}`}></i>;
        };

        function App() {
            const [habits, setHabits] = useState([]);
            const [completions, setCompletions] = useState({});
            const [currentMonth, setCurrentMonth] = useState(new Date());
            const [selectedDate, setSelectedDate] = useState(new Date());
            const [newHabitText, setNewHabitText] = useState('');
            const [isLoaded, setIsLoaded] = useState(false);
            const [showSettings, setShowSettings] = useState(false);

            const { 
                format, addMonths, subMonths, startOfMonth, endOfMonth, 
                startOfWeek, endOfWeek, eachDayOfInterval, isSameMonth, 
                isSameDay, isToday 
            } = window.dateFns;

            // Load data from LocalStorage
            useEffect(() => {
                const savedHabits = localStorage.getItem('daily-tasks-list');
                const savedCompletions = localStorage.getItem('daily-tasks-completions');
                
                if (savedHabits) setHabits(JSON.parse(savedHabits));
                else setHabits([{ id: 'h1', text: '리뷰 관리 매일매일 하기', createdAt: Date.now() }]);
                
                if (savedCompletions) setCompletions(JSON.parse(savedCompletions));
                
                setIsLoaded(true);
                if (window.lucide) window.lucide.createIcons();
            }, []);

            // Save data to LocalStorage
            useEffect(() => {
                if (isLoaded) {
                    localStorage.setItem('daily-tasks-list', JSON.stringify(habits));
                    localStorage.setItem('daily-tasks-completions', JSON.stringify(completions));
                }
            }, [habits, completions, isLoaded]);

            const addHabit = (e) => {
                e.preventDefault();
                if (!newHabitText.trim()) return;
                const newHabit = {
                    id: Math.random().toString(36).substring(2, 9),
                    text: newHabitText.trim(),
                    createdAt: Date.now(),
                };
                setHabits([...habits, newHabit]);
                setNewHabitText('');
            };

            const deleteHabit = (id) => {
                if (!confirm('이 할일을 삭제하시겠습니까?')) return;
                setHabits(habits.filter(h => h.id !== id));
                const newCompletions = { ...completions };
                Object.keys(newCompletions).forEach(date => {
                    newCompletions[date] = newCompletions[date].filter(habitId => habitId !== id);
                });
                setCompletions(newCompletions);
            };

            const toggleCompletion = (habitId) => {
                const dateKey = format(selectedDate, 'yyyy-MM-dd');
                const currentDayCompletions = completions[dateKey] || [];
                let newDayCompletions = currentDayCompletions.includes(habitId)
                    ? currentDayCompletions.filter(id => id !== habitId)
                    : [...currentDayCompletions, habitId];
                setCompletions({ ...completions, [dateKey]: newDayCompletions });
            };

            const days = useMemo(() => {
                const start = startOfWeek(startOfMonth(currentMonth));
                const end = endOfWeek(endOfMonth(currentMonth));
                return eachDayOfInterval({ start, end });
            }, [currentMonth]);

            const getCompletionRate = (date) => {
                if (habits.length === 0) return 0;
                const dateKey = format(date, 'yyyy-MM-dd');
                return (completions[dateKey] || []).length / habits.length;
            };

            const selectedDateKey = format(selectedDate, 'yyyy-MM-dd');
            const selectedDayCompletions = completions[selectedDateKey] || [];

            return (
                <div className="min-h-screen pb-20 px-6 py-12 fade-in">
                    <div className="max-w-4xl mx-auto">
                        
                        {/* Header */}
                        <header className="flex items-center justify-between mb-12">
                            <div>
                                <h1 className="text-4xl font-serif font-light tracking-tight">
                                    하루 <span className="italic text-[#5A5A40]">할일</span>
                                </h1>
                                <p className="text-sm text-[#5A5A40]/60 mt-1 uppercase tracking-widest font-medium">월간 진행 현황</p>
                            </div>
                            <button onClick={() => setShowSettings(true)} className="p-3 bg-white rounded-full shadow-sm hover:shadow-md transition-all text-[#5A5A40]">
                                <Icon name="settings" size={20} />
                            </button>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-12">
                            
                            {/* Calendar Section */}
                            <div className="lg:col-span-7">
                                <div className="bg-white rounded-[32px] p-8 shadow-sm border border-[#5A5A40]/5">
                                    <div className="flex items-center justify-between mb-8">
                                        <h2 className="text-2xl font-serif italic">{format(currentMonth, 'yyyy년 M월')}</h2>
                                        <div className="flex gap-2">
                                            <button onClick={() => setCurrentMonth(subMonths(currentMonth, 1))} className="p-2 hover:bg-[#F5F5F0] rounded-full"><Icon name="chevron-left" size={20} /></button>
                                            <button onClick={() => setCurrentMonth(addMonths(currentMonth, 1))} className="p-2 hover:bg-[#F5F5F0] rounded-full"><Icon name="chevron-right" size={20} /></button>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-7 gap-2 mb-2">
                                        {['일', '월', '화', '수', '목', '금', '토'].map(day => (
                                            <div key={day} className="text-center text-[10px] uppercase tracking-widest font-bold text-[#5A5A40]/40 py-2">{day}</div>
                                        ))}
                                    </div>
                                    <div className="grid grid-cols-7 gap-2">
                                        {days.map(day => {
                                            const rate = getCompletionRate(day);
                                            const isSel = isSameDay(day, selectedDate);
                                            const isCurrMonth = isSameMonth(day, currentMonth);
                                            return (
                                                <button key={day.toString()} onClick={() => setSelectedDate(day)} 
                                                    className={`aspect-square rounded-xl flex flex-col items-center justify-center relative transition-all border-2 ${!isCurrMonth ? 'opacity-20' : ''} ${isSel ? 'border-[#5A5A40]' : 'border-transparent'}`}
                                                    style={{ 
                                                        backgroundColor: rate > 0 ? `rgba(90, 90, 64, ${0.1 + rate * 0.8})` : isCurrMonth ? '#F9F9F7' : 'transparent', 
                                                        color: rate > 0.6 ? 'white' : '#1A1A1A' 
                                                    }}>
                                                    <span className={`text-sm font-medium ${isToday(day) && !rate ? 'text-[#5A5A40] underline underline-offset-4 decoration-2' : ''}`}>{format(day, 'd')}</span>
                                                    {rate === 1 && <div className="absolute top-1 right-1 w-1.5 h-1.5 bg-emerald-400 rounded-full" />}
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>

                            {/* Daily Tasks Section */}
                            <div className="lg:col-span-5">
                                <div className="sticky top-8">
                                    <div className="mb-8">
                                        <span className="text-[10px] uppercase tracking-[0.2em] text-[#5A5A40]/50 font-bold">선택된 날짜</span>
                                        <h3 className="text-3xl font-serif mt-1">{format(selectedDate, 'M월 d일')}</h3>
                                    </div>
                                    <div className="space-y-3">
                                        {habits.length === 0 ? (
                                            <div className="text-center py-12 bg-white rounded-3xl border border-dashed border-[#5A5A40]/20">
                                                <p className="text-sm text-[#5A5A40]/40">등록된 할일이 없습니다.</p>
                                                <button onClick={() => setShowSettings(true)} className="mt-4 text-xs font-bold uppercase tracking-widest text-[#5A5A40] hover:underline">첫 할일 추가하기</button>
                                            </div>
                                        ) : (
                                            habits.map(habit => {
                                                const isDone = selectedDayCompletions.includes(habit.id);
                                                return (
                                                    <div key={habit.id} onClick={() => toggleCompletion(habit.id)} 
                                                        className={`flex items-center gap-4 p-5 rounded-2xl cursor-pointer transition-all border ${isDone ? 'bg-[#5A5A40] text-white border-transparent' : 'bg-white border-[#5A5A40]/5 shadow-sm hover:border-[#5A5A40]/20'}`}>
                                                        {isDone ? <Icon name="check-circle-2" size={24} /> : <Icon name="circle" size={24} className="text-[#5A5A40]/30" />}
                                                        <span className={`flex-1 text-lg font-medium ${isDone ? 'opacity-80' : ''}`}>{habit.text}</span>
                                                    </div>
                                                );
                                            })
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Settings Modal */}
                        {showSettings && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-6 modal-bg">
                                <div onClick={() => setShowSettings(false)} className="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
                                <div className="relative w-full max-w-md bg-white rounded-[40px] p-10 shadow-2xl modal-content">
                                    <div className="flex items-center justify-between mb-8">
                                        <h2 className="text-2xl font-serif">할일 관리</h2>
                                        <button onClick={() => setShowSettings(false)} className="p-2 hover:bg-[#F5F5F0] rounded-full"><Icon name="x" size={20} /></button>
                                    </div>
                                    <form onSubmit={addHabit} className="relative mb-8">
                                        <input type="text" value={newHabitText} onChange={(e) => setNewHabitText(e.target.value)} placeholder="새로운 할일 이름..." className="w-full bg-[#F5F5F0] border-none rounded-2xl px-6 py-4 pr-14 focus:ring-2 focus:ring-[#5A5A40]/20 outline-none" />
                                        <button type="submit" className="absolute right-2 top-1/2 -translate-y-1/2 p-2 bg-[#5A5A40] text-white rounded-xl"><Icon name="plus" size={20} /></button>
                                    </form>
                                    <div className="space-y-2 max-h-[300px] overflow-y-auto pr-2 custom-scrollbar">
                                        {habits.map(habit => (
                                            <div key={habit.id} className="flex items-center justify-between p-4 bg-[#F5F5F0]/50 rounded-xl group">
                                                <span className="font-medium">{habit.text}</span>
                                                <button onClick={() => deleteHabit(habit.id)} className="text-red-400 hover:text-red-600"><Icon name="trash-2" size={18} /></button>
                                            </div>
                                        ))}
                                    </div>
                                    <button onClick={() => setShowSettings(false)} className="w-full mt-8 py-4 bg-[#5A5A40] text-white rounded-2xl font-bold uppercase tracking-widest text-xs hover:bg-[#4A4A30] transition-colors">완료</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
